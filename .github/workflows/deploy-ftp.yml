name: Deploy via FTP (smart-lodge)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-ftp-smart-lodge
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and FTP deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Deploy over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.campreservations.net
          username: ftp-smart@campreservations.net
          password: nEst)F4s_)FL?U]_
          protocol: ftps
          port: 21
          # Remote folder for smart-lodge.lodgex.ca — set FTP_REMOTE_PATH secret if different.
          server-dir:  /home/n0c2265/camp_sites/smart-lodge.lodgex.ca
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.env
            **/.env.*
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/vendor/bin/**
            **/*.md
            **/phpunit.xml
            **/cj*.txt
            **/cookies.txt
          log-level: standard
